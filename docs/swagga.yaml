openapi: 3.0.0
info:
  title: User Service API
  description: Микросервис для управления пользователями
  version: 1.0.0
  contact:
    name: Support Team
    email: support@example.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор пользователя
        email:
          type: string
          format: email
          description: Email пользователя
        phone:
          type: string
          description: Номер телефона
        created_at:
          type: string
          format: date-time
          description: Дата создания
        updated_at:
          type: string
          format: date-time
          description: Дата обновления
        is_active:
          type: boolean
          description: Активен ли пользователь
        subscription_status:
          type: string
          enum: [active, inactive, trial, expired]
          description: Статус подписки
        subscription_expires:
          type: string
          format: date-time
          description: Дата истечения подписки

    UserCreate:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 6
        phone:
          type: string
        subscription_status:
          type: string
          default: inactive

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        is_active:
          type: boolean
        subscription_status:
          type: string
          enum: [active, inactive, trial, expired]
        subscription_expires:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        full_name:
          type: string
          maxLength: 100
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, other]
        height_cm:
          type: integer
          minimum: 50
          maximum: 300
        weight_kg:
          type: number
          format: float
          minimum: 20
          maximum: 500
        fitness_goal:
          type: string
          enum: [weight_loss, muscle_gain, endurance, general_health]
        experience_level:
          type: string
          enum: [beginner, intermediate, advanced]
        health_limitations:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserSettings:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        notifications_enabled:
          type: boolean
          default: true
        language:
          type: string
          maxLength: 5
          default: en
        timezone:
          type: string
          default: UTC
        privacy_level:
          type: string
          enum: [public, private, friends_only]
          default: private
        updated_at:
          type: string
          format: date-time

    RefreshToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        is_revoked:
          type: boolean
          default: false

    Error:
      type: object
      properties:
        code:
          type: integer
          description: Код ошибки
        message:
          type: string
          description: Сообщение об ошибке
        details:
          type: string
          description: Детали ошибки

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /users:
    get:
      summary: Получить список пользователей
      tags:
        - Users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Количество записей на странице
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Смещение от начала
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Фильтр по активности
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Создать нового пользователя
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}:
    get:
      summary: Получить пользователя по ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID пользователя
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Обновить пользователя
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Пользователь обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Удалить пользователя (мягкое удаление)
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Пользователь удален
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}/profile:
    get:
      summary: Получить профиль пользователя
      tags:
        - Profiles
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: Профиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Создать профиль пользователя
      tags:
        - Profiles
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [male, female, other]
                height_cm:
                  type: integer
                weight_kg:
                  type: number
                fitness_goal:
                  type: string
                experience_level:
                  type: string
                health_limitations:
                  type: string
      responses:
        '201':
          description: Профиль создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Обновить профиль пользователя
      tags:
        - Profiles
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [male, female, other]
                height_cm:
                  type: integer
                weight_kg:
                  type: number
                fitness_goal:
                  type: string
                experience_level:
                  type: string
                health_limitations:
                  type: string
      responses:
        '200':
          description: Профиль обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: Профиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}/settings:
    get:
      summary: Получить настройки пользователя
      tags:
        - Settings
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '404':
          description: Настройки не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Обновить настройки пользователя
      tags:
        - Settings
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications_enabled:
                  type: boolean
                language:
                  type: string
                timezone:
                  type: string
                privacy_level:
                  type: string
                  enum: [public, private, friends_only]
      responses:
        '200':
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '404':
          description: Настройки не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}/tokens:
    get:
      summary: Получить все refresh токены пользователя
      tags:
        - Tokens
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RefreshToken'

    post:
      summary: Создать refresh токен
      tags:
        - Tokens
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in_days:
                  type: integer
                  default: 30
                  description: Срок действия токена в днях
      responses:
        '201':
          description: Токен создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshToken'

  /tokens/{tokenId}:
    delete:
      summary: Отозвать refresh токен
      tags:
        - Tokens
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Токен отозван
        '404':
          description: Токен не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'