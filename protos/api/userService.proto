syntax = "proto3";

package userService;

option go_package = "github.com/mihnpro/UserServiceProtos/gen/go/userServicepb;userServicepb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "vendor.proto/google/api/annotations.proto";
import "vendor.proto/protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "User Service API";
        version: "1.0.0";
        description: "Микросервис для управления пользователями";
    };
    host: "localhost:8080";
    base_path: "/api/v1";
    schemes: HTTP;
    schemes: HTTPS;
    consumes: "application/json";
    produces: "application/json";
    security_definitions: {
        security: {
            key: "bearerAuth";
            value: {
                type: TYPE_API_KEY;
                in: IN_HEADER;
                name: "Authorization";
            }
        }
    }
};

// Единый сервис для управления пользователями
service UserService {
    rpc SignUp(SignUpRequest) returns (SignUpResponse) {
        option (google.api.http) = {
            post: "/api/v1/users"
            body: "*"
        };
    }

    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/login"
            body: "*"
        };
    }

    rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/refresh"
            body: "*"
        };
    }

    rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            post: "/api/v1/auth/logout"
            body: "*"
        };
    }

    rpc GetUser(GetUserRequest) returns (GetUserResponse) {
        option (google.api.http) = {
            get: "/api/v1/users/{user_id}"
        };
    }

    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
        option (google.api.http) = {
            put: "/api/v1/users/{user_id}"
            body: "*"
        };
    }

    rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            delete: "/api/v1/users/{user_id}"
        };
    }

    rpc CreateUserProfile(CreateUserProfileRequest) returns (UserProfile) {
        option (google.api.http) = {
            post: "/api/v1/users/{user_id}/profile"
            body: "*"
        };
    }

    rpc GetUserProfile(GetUserProfileRequest) returns (UserProfile) {
        option (google.api.http) = {
            get: "/api/v1/users/{user_id}/profile"
        };
    }

    rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserProfile) {
        option (google.api.http) = {
            put: "/api/v1/users/{user_id}/profile"
            body: "*"
        };
    }

    rpc DeleteUserProfile(DeleteUserProfileRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            delete: "/api/v1/users/{user_id}/profile"
        };
    }

    rpc GetUserSettings(GetUserSettingsRequest) returns (UserSettings) {
        option (google.api.http) = {
            get: "/api/v1/users/{user_id}/settings"
        };
    }

    rpc UpdateUserSettings(UpdateUserSettingsRequest) returns (UserSettings) {
        option (google.api.http) = {
            put: "/api/v1/users/{user_id}/settings"
            body: "*"
        };
    }

    rpc GetCurrentUserID(google.protobuf.Empty) returns (CurrentUserIDResponse) {
        option (google.api.http) = {
            get: "/api/v1/users/me/id"
        };
    }
}

// Enums
enum SubscriptionStatus {
    SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
    SUBSCRIPTION_STATUS_ACTIVE = 1;
    SUBSCRIPTION_STATUS_INACTIVE = 2;
    SUBSCRIPTION_STATUS_EXPIRED = 3;
    SUBSCRIPTION_STATUS_TRIAL = 4;
    SUBSCRIPTION_STATUS_NONE = 5;
}

enum Gender {
    GENDER_UNSPECIFIED = 0;
    GENDER_MALE = 1;
    GENDER_FEMALE = 2;
    GENDER_OTHER = 3;
}

enum FitnessGoal {
    FITNESS_GOAL_UNSPECIFIED = 0;
    FITNESS_GOAL_WEIGHT_LOSS = 1;
    FITNESS_GOAL_MUSCLE_GAIN = 2;
    FITNESS_GOAL_ENDURANCE = 3;
    FITNESS_GOAL_GENERAL_HEALTH = 4;
    FITNESS_GOAL_MAINTENANCE = 5;
}

enum ExperienceLevel {
    EXPERIENCE_LEVEL_UNSPECIFIED = 0;
    EXPERIENCE_LEVEL_BEGINNER = 1;
    EXPERIENCE_LEVEL_INTERMEDIATE = 2;
    EXPERIENCE_LEVEL_ADVANCED = 3;
    EXPERIENCE_LEVEL_PROFESSIONAL = 4;
}

enum PrivacyLevel {
    PRIVACY_LEVEL_UNSPECIFIED = 0;
    PRIVACY_LEVEL_PUBLIC = 1;
    PRIVACY_LEVEL_PRIVATE = 2;
    PRIVACY_LEVEL_FRIENDS = 3;
    PRIVACY_LEVEL_ONLY_ME = 4;
}

message CurrentUserIDResponse {
    string user_id = 1;
}

message SignUpRequest {
    string email = 1;
    string password = 2;
    optional string phone = 3;
}

message SignUpResponse {
    string user_id = 1;
    string message = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    string user_id = 3;
    string email = 4;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message LogoutRequest {
    string user_id = 1;
    string refresh_token = 2;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    string user_id = 1;
    string email = 2;
    optional string phone = 3;
    bool is_active = 4;
    SubscriptionStatus subscription_status = 5;
    google.protobuf.Timestamp subscription_expires = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
}

message UpdateUserRequest {
    string user_id = 1;
    optional string email = 2;
    optional string phone = 3;
    optional bool is_active = 4;
    optional SubscriptionStatus subscription_status = 5;
    optional google.protobuf.Timestamp subscription_expires = 6;
}

message UpdateUserResponse {
    string user_id = 1;
    string email = 2;
    optional string phone = 3;
    bool is_active = 4;
    SubscriptionStatus subscription_status = 5;
    google.protobuf.Timestamp subscription_expires = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message DeleteUserRequest {
    string user_id = 1;
    bool permanent = 2;
}

message UserProfile {
    string profile_id = 1;
    string user_id = 2;
    string name = 3;
    string surname = 4;
    optional string patronymic = 5;
    optional google.protobuf.Timestamp date_of_birth = 6;
    optional Gender gender = 7;
    optional int32 height_cm = 8;
    optional double weight_kg = 9;
    optional FitnessGoal fitness_goal = 10;
    optional ExperienceLevel experience_level = 11;
    optional string health_limitations = 12;
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;
}

message CreateUserProfileRequest {
    string user_id = 1;
    string name = 2;
    string surname = 3;
    optional string patronymic = 4;
    optional google.protobuf.Timestamp date_of_birth = 5;
    optional Gender gender = 6;
    optional int32 height_cm = 7;
    optional double weight_kg = 8;
    optional FitnessGoal fitness_goal = 9;
    optional ExperienceLevel experience_level = 10;
    optional string health_limitations = 11;
}

message GetUserProfileRequest {
    string user_id = 1;
}

message UpdateUserProfileRequest {
    string user_id = 1;
    optional string name = 2;
    optional string surname = 3;
    optional string patronymic = 4;
    optional google.protobuf.Timestamp date_of_birth = 5;
    optional Gender gender = 6;
    optional int32 height_cm = 7;
    optional double weight_kg = 8;
    optional FitnessGoal fitness_goal = 9;
    optional ExperienceLevel experience_level = 10;
    optional string health_limitations = 11;
}

message DeleteUserProfileRequest {
    string user_id = 1;
}

message UserSettings {
    string settings_id = 1;
    string user_id = 2;
    bool notifications_enabled = 3;
    string language = 4;
    string timezone = 5;
    PrivacyLevel privacy_level = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message GetUserSettingsRequest {
    string user_id = 1;
}

message UpdateUserSettingsRequest {
    string user_id = 1;
    optional bool notifications_enabled = 2;
    optional string language = 3;
    optional string timezone = 4;
    optional PrivacyLevel privacy_level = 5;
}
