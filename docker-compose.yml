services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-UserService}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-UserService}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: fitness_redis
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6381}:6381"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-""} --appendonly yes
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: service/Dockerfile
    container_name: fitness_app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"
      - "${APP_GRPC_PORT:-9090}:9090"
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      TRAIN_GRPC_ADDR: "${TRAIN_GRPC_ADDR:-host.docker.internal:50051}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-fitness_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-user_password}
      POSTGRES_DB: ${POSTGRES_DB:-UserService}
      POSTGRES_SSLMODE: disable
      
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      REDIS_DB: ${REDIS_DB:-0}
      
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --quiet --tries=1 --spider http://localhost:8080/metrics || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 25s
    restart: unless-stopped


  pgadmin:
    image: dpage/pgadmin4
    container_name: fitness_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - pgadmin-data:/var/lib/pgadmin
  # ========== МЕТРИКИ ==========
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: fitness_victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
      - ./victoriametrics/scrape.yml:/etc/victoriametrics/scrape.yml:ro
    command:
      - '-httpListenAddr=:8428'
      - '-promscrape.config=/etc/victoriametrics/scrape.yml'
      - '-storageDataPath=/victoria-metrics-data'
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ========== ЛОГИ ==========
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: fitness_victorialogs
    ports:
      - "9428:9428"
    volumes:
      - victorialogs-data:/victoria-logs-data
    command:
      - '-httpListenAddr=:9428'
      - '-storageDataPath=/victoria-logs-data'
    networks:
      - app-network
    restart: unless-stopped

  # ========== СБОРЩИК ЛОГОВ (VECTOR) ===========
  vector:
    image: timberio/vector:latest-alpine
    container_name: fitness_vector
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # доступ к Docker для чтения логов
    environment:
      VECTOR_CONFIG: /etc/vector/vector.toml
    depends_on:
      - victorialogs
      - loki
      - app
    networks:
      - app-network
    restart: unless-stopped

  # ========== ВИЗУАЛИЗАЦИЯ (GRAFANA) ==========
  grafana:
    image: grafana/grafana:latest
    container_name: fitness_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_INSTALL_PLUGINS=
    depends_on:
      - victoriametrics
      - victorialogs
      - loki
    networks:
      - app-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: fitness_loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
    name: fitness_postgres_data
  redis-data:
    name: fitness_redis_data
  pgadmin-data:
    name: fitness_pgadmin_data
  victoriametrics-data:
    name: fitness_victoriametrics_data
  victorialogs-data:
    name: fitness_victorialogs_data
  grafana-data:
    name: fitness_grafana_data
  loki-data:
    name: fitness_loki_data

networks:
  app-network:
    name: fitness_network
    driver: bridge